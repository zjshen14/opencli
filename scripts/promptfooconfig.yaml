# promptfoo spike config — 3 representative scenarios
# Usage: npx promptfoo eval --config scripts/promptfooconfig.yaml
# Requires: npm run build && GEMINI_API_KEY=... (or ANTHROPIC_API_KEY / OPENAI_API_KEY)
# Override model: EVAL_MODEL=claude-haiku-4-5-20251001

providers:
  - id: file://./eval-provider.cjs
    config:
      label: opencli

prompts:
  - "{{prompt}}"

tests:
  # ── 1. Read + explain ────────────────────────────────────────────────────────
  - description: "explain-math-module: Describe exports of math.ts"
    vars:
      scenarioId: explain-math-module
      fixture: mini-ts
      prompt: "Describe what src/math.ts exports and what each function does."
      expectFiles: []
    assert:
      - type: javascript
        value: |
          const o = output;
          return (
            o.agentOutput.includes('add') &&
            o.agentOutput.includes('subtract') &&
            o.agentOutput.includes('multiply')
          );

  # ── 2. Bug fix ───────────────────────────────────────────────────────────────
  - description: "fix-off-by-one: Fix Counter.value returning count - 1"
    vars:
      scenarioId: fix-off-by-one
      fixture: mini-ts-bugs
      prompt: "There is a bug in src/counter.ts — the value getter returns one less than expected. Fix it."
      expectFiles:
        - src/counter.ts
    assert:
      - type: javascript
        value: |
          const o = output;
          const f = o.files['src/counter.ts'];
          return (
            o.typeCheckOk &&
            f !== null &&
            f.includes('return this._count') &&
            !f.includes('this._count - 1')
          );

  # ── 3. Multi-file ────────────────────────────────────────────────────────────
  - description: "update-interface-and-impl: Add description field to Task"
    vars:
      scenarioId: update-interface-and-impl
      fixture: multi-file
      prompt: >
        Add a 'description: string' field to the Task interface in src/task.ts.
        Update createTask() in src/task.impl.ts to accept a description parameter and set it.
      expectFiles:
        - src/task.ts
        - src/task.impl.ts
    assert:
      - type: javascript
        value: |
          const o = output;
          return (
            o.typeCheckOk &&
            o.files['src/task.ts'] !== null &&
            o.files['src/task.ts'].includes('description') &&
            o.files['src/task.impl.ts'] !== null &&
            o.files['src/task.impl.ts'].includes('description')
          );
